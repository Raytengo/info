<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>AI Research</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── Variables ── */
    :root {
      --bg:          #F2F2F7;
      --surface:     #FFFFFF;
      --surface2:    #E5E5EA;
      --text:        #000000;
      --text2:       #3C3C43;
      --muted:       #6C6C70;
      --sep:         #E5E5EA;
      --overlay:     rgba(0,0,0,0.4);
      --openai:      #10A37F;
      --anthropic:   #CC785C;
      --deepmind:    #4285F4;
      --nvidia:      #76B900;
      --radius-card: 16px;
      --radius-pill: 20px;
      --sheet-radius:22px;
      --transition:  200ms cubic-bezier(0.4, 0, 0.2, 1);
      --spring:      380ms cubic-bezier(0.32, 0.72, 0, 1);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:       #000000;
        --surface:  #1C1C1E;
        --surface2: #2C2C2E;
        --text:     #FFFFFF;
        --text2:    #EBEBF5;
        --muted:    #8E8E93;
        --sep:      #38383A;
        --overlay:  rgba(0,0,0,0.6);
      }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Header ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: color-mix(in srgb, var(--bg) 85%, transparent);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      backdrop-filter: saturate(180%) blur(20px);
      padding: env(safe-area-inset-top, 0) 20px 0;
      border-bottom: 1px solid var(--sep);
    }
    .header-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 18px 0 10px;
    }
    .header-left { display: flex; align-items: baseline; gap: 10px; }
    h1 {
      font-family: 'Newsreader', Georgia, serif;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .last-updated {
      font-size: 12px;
      color: var(--muted);
      font-weight: 400;
      letter-spacing: 0;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 7px;
      padding: 0 0 12px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      border-radius: var(--radius-pill);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      outline: none;
      background: var(--surface2);
      color: var(--muted);
      transition: background var(--transition), color var(--transition), transform 100ms;
      user-select: none;
    }
    .tab:active { transform: scale(0.94); }
    .tab.active                       { background: var(--text);       color: var(--bg); }
    .tab[data-lab="openai"].active    { background: var(--openai);     color: #fff; }
    .tab[data-lab="anthropic"].active { background: var(--anthropic);  color: #fff; }
    .tab[data-lab="deepmind"].active  { background: var(--deepmind);   color: #fff; }
    .tab[data-lab="nvidia"].active    { background: var(--nvidia);     color: #fff; }
    .tab-badge {
      background: rgba(255,255,255,0.3);
      color: inherit;
      font-size: 11px;
      font-weight: 700;
      border-radius: 8px;
      padding: 1px 5px;
      min-width: 18px;
      text-align: center;
      line-height: 1.4;
    }
    .tab:not(.active) .tab-badge { background: var(--sep); color: var(--muted); }

    /* ── List ── */
    .list {
      padding: 12px 16px calc(40px + env(safe-area-inset-bottom, 0));
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .list.fade-out { opacity: 0; transform: translateY(4px); transition: opacity 150ms, transform 150ms; }
    .list.fade-in  { opacity: 1; transform: translateY(0);   transition: opacity 200ms, transform 200ms; }

    /* ── Digest Card (summary, non-tappable) ── */
    .card-digest {
      background: var(--surface);
      border-radius: var(--radius-card);
      overflow: hidden;
      display: block;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      border-top: 3px solid var(--lab-color);
      transition: opacity 200ms;
    }
    .card-digest-inner { padding: 14px 18px 18px; }
    .digest-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      color: var(--lab-color);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 8px;
    }
    .digest-icon {
      width: 14px; height: 14px;
      color: var(--lab-color);
      flex-shrink: 0;
    }
    .digest-title {
      font-family: 'Newsreader', Georgia, serif;
      font-size: 17px;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 8px;
      color: var(--text);
    }
    .digest-body {
      font-size: 14px;
      color: var(--text2);
      line-height: 1.7;
    }
    .digest-body p {
      margin: 0 0 0.6em 0;
    }
    .digest-body p:last-child {
      margin-bottom: 0;
    }
    .digest-li {
      position: relative;
      padding-left: 15px;
      margin: 0 0 0.5em 0;
    }
    .digest-li::before {
      content: '';
      position: absolute;
      left: 2px; top: 0.62em;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--lab-color);
      opacity: 0.85;
    }
    .digest-li:last-child { margin-bottom: 0; }
    .digest-li strong {
      color: var(--text);
      font-weight: 600;
    }

    /* ── Regular Card ── */
    .card {
      display: flex;
      background: var(--surface);
      border-radius: var(--radius-card);
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
      transition: transform var(--transition), box-shadow var(--transition), opacity var(--transition);
    }
    .card:active { transform: scale(0.982); box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
    .card-accent { width: 4px; flex-shrink: 0; background: var(--lab-color); }
    .card-inner { flex: 1; padding: 13px 15px 13px 13px; min-width: 0; }
    .card-title {
      font-family: 'Newsreader', Georgia, serif;
      font-size: 16px;
      font-weight: 600;
      line-height: 1.4;
      margin: 5px 0 4px;
      color: var(--text);
    }
    .card-summary {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Shared card meta */
    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .lab-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 700;
      color: var(--lab-color);
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .lab-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--lab-color);
      flex-shrink: 0;
    }
    .card-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .unread-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #007AFF;
      flex-shrink: 0;
    }
    .card-date {
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
      white-space: nowrap;
    }

    /* Read state */
    .card.read { opacity: 0.45; }
    .card.read .unread-dot { display: none; }

    /* ── Skeleton loading ── */
    .skeleton { background: var(--surface); border-radius: var(--radius-card); overflow: hidden; }
    .skeleton-inner { padding: 14px 16px; }
    .skel-line {
      border-radius: 6px;
      background: var(--surface2);
      animation: shimmer 1.4s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.45; }
    }

    /* ── Placeholder ── */
    .placeholder {
      text-align: center;
      padding: 64px 20px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }
    .placeholder svg { margin-bottom: 14px; opacity: 0.45; }

    /* ── Bottom Sheet ── */
    .sheet-backdrop {
      position: fixed; inset: 0; z-index: 100;
      background: var(--overlay);
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 300ms;
    }
    .sheet-backdrop.open { opacity: 1; pointer-events: all; }

    .sheet {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 101;
      background: var(--surface);
      border-radius: var(--sheet-radius) var(--sheet-radius) 0 0;
      padding: 0 0 env(safe-area-inset-bottom, 16px);
      max-height: 85vh;
      overflow-y: auto;
      overscroll-behavior: contain;
      transform: translateY(100%);
      transition: transform var(--spring);
      will-change: transform;
    }
    .sheet.open { transform: translateY(0); }

    .sheet-handle {
      display: flex;
      justify-content: center;
      padding: 12px 0 4px;
      cursor: pointer;
    }
    .sheet-handle-bar {
      width: 36px; height: 4px;
      border-radius: 2px;
      background: var(--surface2);
    }
    .sheet-body { padding: 4px 22px 24px; }
    .sheet-meta { margin-bottom: 12px; }
    .sheet-title {
      font-family: 'Newsreader', Georgia, serif;
      font-size: 22px;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 14px;
      color: var(--text);
    }
    .sheet-detail {
      font-size: 16px;
      line-height: 1.75;
      color: var(--text2);
      margin-bottom: 24px;
      white-space: pre-wrap;
    }
    .sheet-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px;
      border-radius: 13px;
      background: var(--lab-color, #007AFF);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: opacity var(--transition), transform 100ms;
      text-decoration: none;
    }
    .sheet-btn:active { opacity: 0.8; transform: scale(0.98); }

    /* ── Swipe overlay ── */
    .card { position: relative; will-change: transform; touch-action: pan-y; }
    .swipe-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      opacity: 0;
      pointer-events: none;
      z-index: 2;
      border-radius: var(--radius-card);
    }
    .swipe-overlay.like    { background: rgba(52, 199, 89, 0.14); color: #34C759; }
    .swipe-overlay.dislike { background: rgba(255, 59, 48,  0.14); color: #FF3B30; }

    /* ── Rating Arrow ── */
    .rating-arrow {
      display: inline-block;
      margin-left: 6px;
      font-size: 17px;
      vertical-align: middle;
      opacity: 0;
      transition: opacity 250ms;
      line-height: 1;
    }
    .rating-arrow.visible { opacity: 1; }
    .rating-arrow.like    { color: #34C759; }
    .rating-arrow.dislike { color: #FF3B30; }

  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-row">
    <div class="header-left">
      <h1>AI Research</h1>
    </div>
    <span class="last-updated" id="lastUpdated"></span>
    <button id="tokenBtn" onclick="promptToken()" style="background:none;border:none;cursor:pointer;padding:4px;color:var(--muted);line-height:1;" title="設定 GitHub Token">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>
  <div class="tabs" id="tabs">
    <button class="tab active" data-lab="all">全部<span class="tab-badge" id="badge-all"></span></button>
    <button class="tab" data-lab="openai">OpenAI<span class="tab-badge" id="badge-openai"></span></button>
    <button class="tab" data-lab="anthropic">Anthropic<span class="tab-badge" id="badge-anthropic"></span></button>
    <button class="tab" data-lab="deepmind">DeepMind<span class="tab-badge" id="badge-deepmind"></span></button>
    <button class="tab" data-lab="nvidia">NVIDIA<span class="tab-badge" id="badge-nvidia"></span></button>
  </div>
</div>

<!-- List -->
<div class="list" id="list">
  <!-- Skeleton -->
  <div class="skeleton">
    <div class="skeleton-inner">
      <div class="skel-line" style="height:10px;width:60px;margin-bottom:10px"></div>
      <div class="skel-line" style="height:18px;width:90%;margin-bottom:6px"></div>
      <div class="skel-line" style="height:18px;width:75%;margin-bottom:10px"></div>
      <div class="skel-line" style="height:13px;width:100%;margin-bottom:4px"></div>
      <div class="skel-line" style="height:13px;width:80%"></div>
    </div>
  </div>
  <div class="skeleton" style="opacity:0.7">
    <div class="skeleton-inner">
      <div class="skel-line" style="height:10px;width:50px;margin-bottom:10px"></div>
      <div class="skel-line" style="height:16px;width:85%;margin-bottom:5px"></div>
      <div class="skel-line" style="height:16px;width:65%;margin-bottom:10px"></div>
      <div class="skel-line" style="height:12px;width:100%;margin-bottom:4px"></div>
      <div class="skel-line" style="height:12px;width:70%"></div>
    </div>
  </div>
  <div class="skeleton" style="opacity:0.4">
    <div class="skeleton-inner">
      <div class="skel-line" style="height:10px;width:70px;margin-bottom:10px"></div>
      <div class="skel-line" style="height:16px;width:80%;margin-bottom:5px"></div>
      <div class="skel-line" style="height:16px;width:60%"></div>
    </div>
  </div>
</div>

<!-- Bottom Sheet -->
<div class="sheet-backdrop" id="backdrop"></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true">
  <div class="sheet-handle" id="sheetHandle"><div class="sheet-handle-bar"></div></div>
  <div class="sheet-body">
    <div class="card-meta sheet-meta" id="sheetMeta"></div>
    <div class="sheet-title" id="sheetTitle"></div>
    <div class="sheet-detail" id="sheetDetail"></div>
    <a class="sheet-btn" id="sheetBtn" target="_blank" rel="noopener">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      閱讀全文
    </a>
  </div>
</div>

<script>
  const LAB_COLORS = { openai: '#10A37F', anthropic: '#CC785C', deepmind: '#4285F4', nvidia: '#76B900' };
  const LAB_LABELS = { openai: 'OpenAI', anthropic: 'Anthropic', deepmind: 'DeepMind', nvidia: 'NVIDIA' };

  // ── GitHub Feedback Config ──
  // 填入你的 fine-grained PAT（只需 Raytengo/info 的 Contents: Read and write）
  const GH_TOKEN = localStorage.getItem('gh-feedback-token') || '';
  const GH_OWNER = 'Raytengo';
  const GH_REPO  = 'info';

  let articles = [];
  let meta     = {};
  let digest   = {};
  let filter   = 'all';
  let readSet  = new Set(JSON.parse(localStorage.getItem('ai-read') || '[]'));
  let sheetArticle = null;
  let view     = [];  // 目前顯示順序（篩選 + 未讀優先排序後）；index 查找的單一依據

  // ── Feedback state ──
  let feedbackMap = {}; // { articleId: 'like' | 'dislike' }
  let feedbackSHA = null;

  async function loadFeedback() {
    if (!GH_TOKEN || GH_TOKEN === 'YOUR_PAT_HERE') return;
    try {
      const r = await fetch(
        `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/feedback.json`,
        { headers: { Authorization: `token ${GH_TOKEN}`, Accept: 'application/vnd.github.v3+json' } }
      );
      if (r.ok) {
        const file = await r.json();
        feedbackSHA = file.sha;
        const data = JSON.parse(atob(file.content.replace(/\n/g, '')));
        feedbackMap = data.ratings || {};
      }
    } catch(e) { console.warn('feedback load:', e); }
  }

  async function submitFeedback(articleId, rating) {
    // 點同一個按鈕 = 取消
    if (feedbackMap[articleId] === rating) {
      delete feedbackMap[articleId];
    } else {
      feedbackMap[articleId] = rating;
    }
    updateFeedbackUI(articleId);

    if (!GH_TOKEN || GH_TOKEN === 'YOUR_PAT_HERE') return; // 未設定 PAT 時只更新本地 UI

    const payload = { updated_at: new Date().toISOString(), ratings: feedbackMap };
    const body    = {
      message: `feedback: ${feedbackMap[articleId] || 'remove'} on ${articleId}`,
      content: btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2)))),
    };
    if (feedbackSHA) body.sha = feedbackSHA;

    const row = document.getElementById('feedbackRow');
    try {
      if (row) row.classList.add('fb-saving');
      const r = await fetch(
        `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/feedback.json`,
        {
          method: 'PUT',
          headers: { Authorization: `token ${GH_TOKEN}`, 'Content-Type': 'application/json', Accept: 'application/vnd.github.v3+json' },
          body: JSON.stringify(body)
        }
      );
      if (r.ok) {
        const data = await r.json();
        feedbackSHA = data.content.sha;
      }
    } catch(e) { console.warn('feedback write:', e); }
    finally { if (row) row.classList.remove('fb-saving'); }
  }

  function updateFeedbackUI(articleId) {
    const rating = feedbackMap[articleId];
    const arrow  = document.querySelector(`.rating-arrow[data-id="${articleId}"]`);
    if (!arrow) return;
    arrow.classList.remove('like', 'dislike', 'visible');
    if (rating === 'like')         { arrow.textContent = '▲'; arrow.classList.add('like',    'visible'); }
    else if (rating === 'dislike') { arrow.textContent = '▼'; arrow.classList.add('dislike', 'visible'); }
    else                           { arrow.textContent = ''; }
  }

  function bindCardInteractions(el, article) {
    if (!article) return;
    const DIST  = 68;     // px to commit
    const FLICK = 0.38;   // px/ms velocity threshold for quick flick

    let startX = 0, startY = 0, currentDx = 0;
    let dragging = false, active = false;
    let prevX = 0, prevT = 0, velocity = 0;

    const oLike    = el.querySelector('.swipe-overlay.like');
    const oDislike = el.querySelector('.swipe-overlay.dislike');

    function clearOverlays(animate) {
      const tr = animate ? 'opacity 220ms ease-out' : 'none';
      oLike.style.transition = oDislike.style.transition = tr;
      oLike.style.opacity = oDislike.style.opacity = '0';
    }

    function onDown(cx, cy) {
      startX = cx; startY = cy; currentDx = 0;
      dragging = false; active = true;
      prevX = cx; prevT = Date.now(); velocity = 0;
      el.style.transition = 'none';
      clearOverlays(false);
    }

    function onMove(cx, cy) {
      if (!active) return;
      const dx = cx - startX;
      const dy = cy - startY;
      if (!dragging && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) dragging = true;
      if (!dragging) return;
      currentDx = dx;

      const now = Date.now(), dt = now - prevT;
      if (dt > 0) velocity = (cx - prevX) / dt;
      prevX = cx; prevT = now;

      el.style.transform = `translateX(${dx}px)`;

      // Overlay colour: gray if already rated (any swipe = cancel), green/red if unrated
      const t = Math.min(Math.abs(dx) / DIST, 1);
      const isRated = !!feedbackMap[article.id];
      const cancelBg = 'rgba(142,142,147,0.18)';
      oLike.style.transition = oDislike.style.transition = 'none';
      oLike.style.background    = isRated ? cancelBg : 'rgba(52,199,89,0.14)';
      oDislike.style.background = isRated ? cancelBg : 'rgba(255,59,48,0.14)';
      if (dx > 6)       { oLike.style.opacity = t;  oDislike.style.opacity = '0'; }
      else if (dx < -6) { oDislike.style.opacity = t; oLike.style.opacity = '0'; }
      else              { oLike.style.opacity = oDislike.style.opacity = '0'; }
    }

    function onUp(cx) {
      if (!active) return;
      active = false;
      const dx = cx - startX;
      const flick     = Math.abs(velocity) > FLICK && Math.abs(dx) > 18;
      const committed = dragging && (Math.abs(dx) >= DIST || flick);

      // Spring: slight overshoot then settle (the signature Apple feel)
      el.style.transition = 'transform 420ms cubic-bezier(0.175, 0.885, 0.32, 1.275)';
      el.style.transform  = '';
      clearOverlays(true);

      if (committed) {
        el.dataset.swiped = '1';
        if (feedbackMap[article.id]) {
          // Already rated → any swipe = cancel (toggle off)
          submitFeedback(article.id, feedbackMap[article.id]);
        } else {
          submitFeedback(article.id, dx > 0 ? 'like' : 'dislike');
        }
      }
      dragging = false;
    }

    function onCancel() {
      active = false; dragging = false;
      el.style.transition = 'transform 300ms ease-out';
      el.style.transform  = '';
      clearOverlays(true);
    }

    el.addEventListener('touchstart',  e => onDown(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
    el.addEventListener('touchmove',   e => { if (dragging) e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
    el.addEventListener('touchend',    e => onUp(e.changedTouches[0].clientX), { passive: true });
    el.addEventListener('touchcancel', onCancel, { passive: true });

    el.addEventListener('mousedown', e => { if (e.button !== 0) return; onDown(e.clientX, e.clientY); });
    window.addEventListener('mousemove', e => { if (active) onMove(e.clientX, e.clientY); });
    window.addEventListener('mouseup',   e => { if (active) onUp(e.clientX); });

    el.addEventListener('click', () => {
      if (el.dataset.swiped) { delete el.dataset.swiped; return; }
      if (Math.abs(currentDx) > 10) return;
      const idx = parseInt(el.dataset.idx);
      openSheet(view[idx], el);
    });
  }

  function promptToken() {
    const cur = localStorage.getItem('gh-feedback-token') || '';
    const val = prompt('貼上你的 GitHub fine-grained PAT\n（只需 Raytengo/info 的 Contents: Read and write）\n留空可清除已儲存的 token：', cur);
    if (val === null) return; // 按取消
    if (val.trim()) {
      localStorage.setItem('gh-feedback-token', val.trim());
      location.reload(); // reload 讓新 token 生效
    } else {
      localStorage.removeItem('gh-feedback-token');
      alert('Token 已清除');
    }
  }

  // ── Relative time ──
  function relTime(dateStr) {
    const diff  = Date.now() - new Date(dateStr);
    const days  = Math.floor(diff / 86400000);
    const hours = Math.floor(diff / 3600000);
    const mins  = Math.floor(diff / 60000);
    if (days >= 14) return new Date(dateStr).toLocaleDateString('zh-TW', { month: 'numeric', day: 'numeric' });
    if (days >= 1)  return `${days} 天前`;
    if (hours >= 1) return `${hours} 小時前`;
    if (mins >= 1)  return `${mins} 分鐘前`;
    return '剛剛';
  }

  // ── Unread count ──
  function unreadCount(lab) {
    const pool = lab === 'all' ? articles : articles.filter(a => a.lab === lab);
    return pool.filter(a => !readSet.has(a.id)).length;
  }

  function updateBadges() {
    ['all','openai','anthropic','deepmind','nvidia'].forEach(lab => {
      const n = unreadCount(lab);
      const el = document.getElementById('badge-' + lab);
      if (el) { el.textContent = n > 0 ? n : ''; el.style.display = n > 0 ? '' : 'none'; }
    });
  }

  // ── Digest card ──
  // Body format: plain lines. Lines starting with "• " render as bullet rows;
  // a leading "標籤：" inside a bullet is bolded. Other lines render as <p>.
  function renderDigestBody(body) {
    return body.split('\n').map(raw => {
      const line = raw.trim();
      if (!line) return '';
      const esc = line.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      if (esc.startsWith('• ') || esc.startsWith('- ')) {
        let t = esc.replace(/^[•-]\s*/, '');
        t = t.replace(/^([^：]{1,12})：/, '<strong>$1</strong>　');
        return `<div class="digest-li">${t}</div>`;
      }
      return `<p>${esc}</p>`;
    }).join('');
  }

  function renderDigest() {
    const d     = digest[filter];
    const color = filter === 'all' ? '#636366' : (LAB_COLORS[filter] || '#636366');
    const label = filter === 'all' ? '總覽' : (LAB_LABELS[filter] || filter);

    if (!d) return '';

    return `<div class="card-digest" style="--lab-color:${color}">
      <div class="card-digest-inner">
        <div class="digest-title">${d.title}</div>
        <div class="digest-body">${renderDigestBody(d.body)}</div>
      </div>
    </div>`;
  }

  // ── Render ──
  function render(animate = true) {
    // 未讀優先：先篩選，再穩定排序（未讀在前、已讀在後，各組維持原本的日期/偏好順序）
    const shown = (filter === 'all' ? articles : articles.filter(a => a.lab === filter))
      .slice()
      .sort((a, b) => (readSet.has(a.id) ? 1 : 0) - (readSet.has(b.id) ? 1 : 0));
    view = shown;
    const list  = document.getElementById('list');

    if (animate) {
      list.classList.add('fade-out');
      setTimeout(() => { doRender(shown, list); list.classList.remove('fade-out'); list.classList.add('fade-in'); }, 150);
    } else {
      doRender(shown, list);
    }
    updateBadges();
  }

  function doRender(shown, list) {
    const digestHTML = renderDigest();

    if (shown.length === 0) {
      list.innerHTML = digestHTML + `<div class="placeholder">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <div>沒有符合的文章</div></div>`;
      return;
    }

    const cardsHTML = shown.map((a, i) => {
      const color = LAB_COLORS[a.lab] || '#8a8a8d';
      const label = LAB_LABELS[a.lab] || a.lab;
      const date  = relTime(a.published_at);
      const read  = readSet.has(a.id);
      const unreadDot = !read ? '<div class="unread-dot"></div>' : '';
      const cardMeta  = `
        <div class="lab-badge"><div class="lab-dot"></div>${label}</div>
        <div class="card-right">${unreadDot}<span class="card-date">${date}</span></div>`;

      return `<div class="card${read ? ' read' : ''}" style="--lab-color:${color}" data-id="${a.id}" data-idx="${i}" role="button" tabindex="0" aria-label="${a.title}">
        <div class="swipe-overlay like"></div>
        <div class="swipe-overlay dislike"></div>
        <div class="card-accent"></div>
        <div class="card-inner">
          <div class="card-meta">${cardMeta}</div>
          <div class="card-title">${a.title}<span class="rating-arrow${feedbackMap[a.id] ? ' visible ' + feedbackMap[a.id] : ''}" data-id="${a.id}">${feedbackMap[a.id] === 'like' ? '▲' : feedbackMap[a.id] === 'dislike' ? '▼' : ''}</span></div>
          ${a.summary ? `<div class="card-summary">${a.summary}</div>` : ''}
        </div>
      </div>`;
    }).join('');

    list.innerHTML = digestHTML + cardsHTML;

    // Bind swipe + tap
    list.querySelectorAll('.card').forEach(el => {
      const idx = parseInt(el.dataset.idx);
      bindCardInteractions(el, shown[idx]);
    });

  }

  // ── Bottom Sheet ──
  function openSheet(article, cardEl) {
    sheetArticle = article;
    const color = LAB_COLORS[article.lab] || '#007AFF';
    const label = LAB_LABELS[article.lab] || article.lab;

    document.getElementById('sheetMeta').innerHTML = `
      <div class="lab-badge" style="--lab-color:${color}"><div class="lab-dot"></div>${label}</div>
      <div class="card-right"><span class="card-date">${relTime(article.published_at)}</span></div>`;
    document.getElementById('sheetTitle').textContent  = article.title;
    document.getElementById('sheetDetail').textContent = article.detail || article.summary || '';
    document.getElementById('sheetBtn').href           = article.url;
    document.getElementById('sheetBtn').style.background = color;

    document.getElementById('backdrop').classList.add('open');
    document.getElementById('sheet').classList.add('open');
    document.body.style.overflow = 'hidden';

    // Mark as read
    if (!readSet.has(article.id)) {
      readSet.add(article.id);
      localStorage.setItem('ai-read', JSON.stringify([...readSet]));
      if (cardEl) {
        cardEl.classList.add('read');
        cardEl.querySelector('.unread-dot')?.remove();
      }
      updateBadges();
    }
  }

  function closeSheet() {
    document.getElementById('backdrop').classList.remove('open');
    document.getElementById('sheet').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('backdrop').addEventListener('click', closeSheet);
  document.getElementById('sheetHandle').addEventListener('click', closeSheet);

  // Swipe down to close sheet
  let touchStartY = 0;
  const sheet = document.getElementById('sheet');
  sheet.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
  sheet.addEventListener('touchend', e => {
    if (e.changedTouches[0].clientY - touchStartY > 60) { closeSheet(); }
  }, { passive: true });

  // ── Tabs ──
  document.getElementById('tabs').addEventListener('click', e => {
    const tab = e.target.closest('.tab');
    if (!tab) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    filter = tab.dataset.lab;
    render(true);
  });

  // ── Load ──
  async function load() {
    try {
      const r = await fetch('./queue.json?t=' + Date.now());
      const d = await r.json();
      meta     = d.meta || {};
      digest   = d.digest || {};
      articles = (d.articles || []).sort((a, b) => new Date(b.published_at) - new Date(a.published_at));

      // Last updated
      if (meta.last_crawled) {
        document.getElementById('lastUpdated').textContent = '更新 ' + relTime(meta.last_crawled);
      }

      render(false);

      // 深連結：?a=<article-id> → 直接打開該篇（手機 widget 點擊會帶這個參數，免得還要自己找）
      const targetId = new URLSearchParams(location.search).get('a');
      if (targetId) {
        const art = articles.find(a => a.id === targetId);
        if (art) openSheet(art, document.querySelector('.card[data-id="' + CSS.escape(targetId) + '"]'));
      }
    } catch(e) {
      document.getElementById('list').innerHTML = `<div class="placeholder">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4z"/><path d="M8 2v16M16 6v16"/></svg>
        <div>載入失敗<br><small style="font-size:13px">請確認網路連線後重新整理</small></div>
      </div>`;
    }
  }

  load();
  loadFeedback();
</script>
</body>
</html>
